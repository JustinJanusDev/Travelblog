<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        margin: 0;
        padding: 0;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .hero {
        margin: 0;
        padding: 0;

        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;

        width: 1440px;
        height: 533px;

        background-color: #f1c953;
      }

      .headline {
        width: 788px;
        height: 208px;
        /*top: 75px;*/
       /* left: 326px;*/
        gap: 32px;

        position: relative;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

      }

      h1 {
        margin: 0;
        padding: 0;

        width: 345px;
        height: 63px;
        top: 117px;
        left: 175px;

        position: relative;

        z-index: 1;

        font-family: Arima;
        font-weight: 700;
        font-size: 60px;
        line-height: 120%;
        letter-spacing: 0%;

        color: #54370d;

        animation: moveUp 1s ease forwards;
        animation-delay: 1s;
        
      }

      @keyframes moveUp {
        from {
          top: 117px;
          opacity: 1;
        }

        to {
          top: 0px;
          opacity: 1;
        }
        
      }

      span {
        margin: 0;
        padding: 0;

        width: 345px;
        height: 132px;
        /*top: 75px;
        left: 326px;*/

        position: relative;

        z-index: 2;

        font-family: palanquin;
        font-weight: 500;
        font-size: 28px;
        line-height: 110.00000000000001%;
        letter-spacing: 0%;

        color: #54370d;
      }

      .rectangle {
        margin: 0;
        padding: 0;

        width: 788px;
        height: 133px;
        top: 75px;
        /*left: 326px;*/

        position: absolute;

        z-index: 3;

        background-color: #f1c953;

        animation: movedown 1s ease forwards;
        animation-delay: 1s;
      }

      @keyframes movedown {
        from {
          top: 75px;
          opacity: 1;
        }

        to {
          top: 200px;
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <header></header>
    <div class="hero">
      <div class="headline">
        <h1>Cappadocia</h1>
        <span>
          From sunrise balloons to<br />
          hidden cave dwellings, every moment feels unrea<br />
          in the best way.
        </span>
        <div class="rectangle"></div>
      </div>
    </div>
  </body>
</html>
