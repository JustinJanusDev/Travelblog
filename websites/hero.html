<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      body {
        margin: 0;
        padding: 0;

        overflow-x: hidden;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .hero {
        margin: 0;
        padding: 0;

        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 100%;
        max-width: 1440px;
        height: 515px;

        background-image: url(/Travelblog/assets/img/hero_animation/HeroBackgroundImage.jpg);
        background-size: cover;
        background-position: right -300px center;

        overflow: visible;

        z-index: 1;

      }

      .animation {
        position: absolute;

        width: 1440px;
        height: 515px;
        inset: 0;

        overflow: hidden;
      }

      .vector {
        margin: 0;
        padding: 0;

        position: absolute;

        width: 1440px;
        height: 515px;

        background-image: url(/Travelblog/assets/img/hero_animation/hero_web.png) ;

        opacity: 1;

        z-index: 2;

        animation: fadetoleft 2s ease-out forwards;
        animation-delay: 3s;
      }
      @keyframes fadetoleft {
        from {
          transform:translateX(0%);

        }

        to {
          transform: translateX(-100%);
        }
      }

      
      .vector1 {
        margin: 0;
        padding: 0;

        position: absolute;

        width: 942px;
        height: 515px;

        background-image: url(/Travelblog/assets/img/hero_animation/HeroBackgroundImageCoverOne.png);
       
        z-index: 3;
        opacity: 1;

        animation: sideIn 2s ease-out forwards 3s, fadetoleft2 3s ease-out forwards 6s;
      }

      @keyframes sideIn {
        from {
          transform: translateX(100%);
        }

        to {
          transform: translateX(-20%);
        }

      }
      @keyframes fadetoleft2 {
        from {
          transform:translateX(-20%);
        }

        to {
          transform: translateX(-30%);
        }
      }

      .vector2 {
        margin: 0;
        padding: 0;

        left: 64px;
        top: 0px;
        

        position: absolute;

        width: 647px;
        height: 540.1390380859375px;

        background-image: url(/Travelblog/assets/img/hero_animation/HeroBackgroundImageCoverTwo.png);
       
        z-index: 4;

        opacity: 0;
        
       animation: grow 1s ease forwards 6s;
      }

      @keyframes grow {
        from {
         transform: scale(1);
         opacity: 0;
        }

        to {
          transform: scale(1.2);
          opacity: 1;
        }
}

      .text {
        margin: 0;
        padding: 0;

        position: relative;

        width: 345px;
        height: 227px;
        /*top: 144px;*/
       /* left: 557.24px;*/
        gap: 32px;
       

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        background-color: #f1c953;

        opacity: 1;

        animation: sideIntext 1s linear forwards;
        animation-delay: 3.5s;

        z-index: 5;
      }

      @keyframes sideIntext {
        from {
          transform: translateX(0%);
        }

        to {
          transform: translateX(-130%);
        }
      }

      
      h1 {
        margin: 0;
        padding: 0;

        position: absolute;

        width: 345px;
        height: 63px;
        top: 117px;
        /*left: 175px;*/;

        font-family: Arima;
        font-weight: 700;
        font-size: 60px;
        line-height: 120%;
        letter-spacing: 0%;

        color: #54370d;

        z-index: 6;
        
        opacity: 0;

        animation: moveUp 1s ease forwards;
        animation-delay: 1s;
        
      }

      @keyframes moveUp {
        from {
          top: 117px;
          opacity: 0;
        }

        to {
          top: -32px;
          opacity: 1;
        }
      }

      span {
        margin: 0;
        padding: 0;

        position: absolute;


        width: 345px;
        height: 132px;
        top: 75px;

        font-family: palanquin;
        font-weight: 500;
        font-size: 28px;
        line-height: 110.00000000000001%;
        letter-spacing: 0%;

        z-index: 7;

        color: #54370d;

        opacity: 0;

        animation: fadeIn 1s ease-out forwards;
        animation-delay: 2s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      .circle {
        margin: 0;
        padding: 0;

        position: absolute;

        width: 160px;
        height: 160px;
        right: -220px;
        bottom: -220px;

        box-shadow: 4px 4px 4px 4px rgba(0, 0, 0, 0.25);
        
        opacity: 0;

        border-radius: 50%;
        z-index: 8;

        display: flex;
        justify-content: center;
        align-items: center;

        background-color: #4EA487;

        animation: flowup 1s ease forwards;
        animation-delay: 6s;
      }

      @keyframes flowup {
        from {
          transform: translateY(0%);
          opacity: 0;
        }

        to {
          transform: translateY(-100%);
          opacity: 1;
        }
      }

      .rotating-text {
        position: absolute;

        width: 132px;
        height: 132px;

        animation:rotate 8s linear infinite;
      }

      @keyframes rotate {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }

      svg {
        width: 132px;
        height: 132px;

        overflow: visible;
      }

      #curve {
        fill: transparent;
      }

      text {
        fill: #f1c953;

        font-size: 24px;
        font-family: Arima;
        font-weight: bold;
        letter-spacing: 3px;
        text-transform: uppercase;    
      }

      .flag {
        position: absolute;

        width: 50px;
        height: 50px;

        border-radius: 50%;

        background-image: url(/Travelblog/assets/img/hero_animation/circle/Flag_orb_Turkey\ 1.png);
        background-size: cover;
        background-position: center;
      }
    </style>

    <link rel="stylesheet" href="../styles/general_settings/fonts.css" />
  </head>

  <body>
    <header></header>
    <div class="hero">
        <div class="text">
          <h1>Cappadocia</h1>
          <span>
            From sunrise balloons to<br />
            hidden cave dwellings, every moment feels unrea<br />
            in the best way.
          </span>

          <div class="circle">

        <div class="rotating-text">
          <svg viewBox="0 0 200 200">

            <path
              id="curve"
              d="
                M 100,100
                m -65,0
                a 65,65 0 1,1 130,0
                a 65,65 0 1,1 -130,0
              "
            />

            <text>
              <textPath href="#curve">
                CAPPADOCIA • TURKEY • CAPPADOCIA •
              </textPath>
            </text>

          </svg>
        </div>

        <div class="flag"></div>

      </div>
        </div>
        <div class="animation">
          <div class="vector">
          
          </div>
          
          <div class="vector1">
        

          </div>
        </div>
          <div class="vector2">

          </div>
        </div>
    </div>
  </body> 
</html>
